<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- trackActivity · cronómetro estilizado en rounded square emerald. -->
  <rect width="64" height="64" rx="14" fill="#10b981"/>
  <!-- "Botón" del cronómetro arriba para que se lea como reloj/pomodoro. -->
  <rect x="27" y="8" width="10" height="5" rx="1.5" fill="#ffffff"/>
  <!-- Esfera del reloj. -->
  <circle cx="32" cy="36" r="18" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  <!-- Marcas cardinales: 12 · 3 · 6 · 9. -->
  <circle cx="32" cy="20" r="1.6" fill="#ffffff"/>
  <circle cx="48" cy="36" r="1.6" fill="#ffffff"/>
  <circle cx="32" cy="52" r="1.6" fill="#ffffff"/>
  <circle cx="16" cy="36" r="1.6" fill="#ffffff"/>
  <!-- Manecilla apuntando a las 2 (sugiere "en marcha"). -->
  <line x1="32" y1="36" x2="42.5" y2="27.5" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pivote central. -->
  <circle cx="32" cy="36" r="2.4" fill="#ffffff"/>
</svg>
