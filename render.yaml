# render.yaml
services:
  - type: web
    name: trackactivity-team
    env: php
    rootDir: dashboard
    buildCommand: >
      composer install --no-dev --optimize-autoloader &&
      npm ci && npm run build &&
      php artisan migrate --database=supabase --path=database/migrations/team --force
    startCommand: php -S 0.0.0.0:$PORT -t public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_TIMEZONE
        value: UTC
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /tmp/trackactivity-render.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: APP_MODE
        value: team_only
      # Las siguientes se rellenan manualmente en el dashboard de Render:
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: 5432
      - key: SUPABASE_DB_DATABASE
        value: postgres
      - key: SUPABASE_DB_USERNAME
        value: postgres
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_DB_SSLMODE
        value: require
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
