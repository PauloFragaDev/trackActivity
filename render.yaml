services:
  - type: web
    name: trackactivity-team
    env: docker
    dockerfilePath: ./dashboard/Dockerfile
    dockerContext: ./dashboard
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_TIMEZONE
        value: UTC
      - key: APP_MODE
        value: team_only
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /tmp/trackactivity-render.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: PHP_CLI_SERVER_WORKERS
        value: 4
      # Rellenar manualmente en el dashboard de Render:
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: 5432
      - key: SUPABASE_DB_DATABASE
        value: postgres
      - key: SUPABASE_DB_USERNAME
        value: postgres
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_DB_SSLMODE
        value: require
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
